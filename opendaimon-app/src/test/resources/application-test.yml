# Test profile: enable with @ActiveProfiles("test") on Spring tests in this module.
spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - io.github.ngirchev.opendaimon.ai.springai.config.SpringAIAutoConfig
  jpa:
    hibernate:
      ddl-auto: validate  # or none if using Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: mock-key
    ollama:
      base-url: http://localhost:11434

# Prod-like token limits for streaming IT; prompt = system + history + current ≤ max-total-prompt-tokens.
open-daimon:
  telegram:
    enabled: true
  common:
    assistant-role: You are a helpful assistant
    max-output-tokens: 4000
    max-reasoning-tokens: 1500
    max-user-message-tokens: 4000
    max-total-prompt-tokens: 32000
    summarization:
      prompt: "You are an assistant. Create a summary in JSON. Conversation:"
    chat-routing:
      ADMIN:
        max-price: 0.5
        required-capabilities:
          - AUTO
        optional-capabilities: []
      VIP:
        max-price: 0.5
        required-capabilities:
          - CHAT
        optional-capabilities:
          - TOOL_CALLING
          - WEB
      REGULAR:
        max-price: 0.5
        required-capabilities:
          - CHAT
        optional-capabilities: []
  ai:
    openrouter:
      enabled: false
    deepseek:
      enabled: false
    spring-ai:
      enabled: false
      openrouter-auto-rotation:
        models:
          enabled: false
