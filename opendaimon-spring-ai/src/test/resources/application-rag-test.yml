# Test configuration for RAG integration tests
logging:
  level:
    io.github.ngirchev.opendaimon.ai.springai: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.config: DEBUG

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - io.github.ngirchev.opendaimon.ai.springai.config.SpringAIAutoConfig
  ai:
    openai:
      api-key: mock-key
    ollama:
      base-url: http://localhost:11434

open-daimon:
  ai:
    spring-ai:
      rag:
        enabled: true
        chunk-size: 500
        chunk-overlap: 50
        top-k: 3
        similarity-threshold: 0.7
        prompts:
          document-extract-error-pdf: "PDF error: %s"
          document-extract-error-document: "Doc error: %s %s"
          augmented-prompt-template: "Context:\n%s\n\nQuestion: %s"
          vision-extraction-prompt: "Extract ALL text from these PDF page images exactly as written."
      models:
        list:
          - name: "qwen3.5:4b"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - VISION
              - WEB
              - SUMMARIZATION
            provider-type: OLLAMA
            priority: 1
          - name: "nomic-embed-text:v1.5"
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1
