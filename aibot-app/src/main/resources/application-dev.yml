# Dev profile: only overrides vs application.yml (inherits ai-bot.ai.spring-ai.openrouter-auto-rotation.filters, etc.)

ai-bot:
  common:
    max-output-tokens: 1000
  ai:
    spring-ai:
      openrouter-auto-rotation:
        max-attempts: 3
      models:
        list:
          - name: "openrouter/auto"
            capabilities:
              - AUTO
            provider-type: OPENAI
            priority: 3
          - name: "qwen2.5:7b"
            capabilities:
              - CHAT
              - TOOL_CALLING
            provider-type: OLLAMA
            priority: 1
          - name: "llama2:latest"
            capabilities:
              - CHAT
            provider-type: OLLAMA
            priority: 1
          - name: "qwen3-embedding:8b"
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1
          - name: "mistral:7b"
            capabilities:
              - STRUCTURED_OUTPUT
              - SUMMARIZATION
            provider-type: OLLAMA
            priority: 1
          - name: "tngtech/deepseek-r1t2-chimera:free"
            capabilities:
              - CHAT
              - STRUCTURED_OUTPUT
              - SUMMARIZATION
            provider-type: OPENAI
            priority: 3
          - name: "xiaomi/mimo-v2-flash:free"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - SUMMARIZATION
            provider-type: OPENAI
            priority: 2

spring:
  ai:
    ollama:
      # If you get DNS errors (NXDOMAIN) for .local domains, use IP or add /etc/hosts entry.
      # e.g. echo "192.168.1.x your-ollama-host.local" | sudo tee -a /etc/hosts
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

logging:
  level:
    org.springframework.ai.chat.model.MessageAggregator: WARN
